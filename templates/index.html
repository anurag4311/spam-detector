<!DOCTYPE html>
<html>
<head>
    <title>AI Spam Detector</title>

    <style>
        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            font-family: 'Segoe UI', sans-serif;
            text-align: center;
            color: white;
        }

        .container {
            background: white;
            color: black;
            width: 40%;
            margin: 60px auto;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.3);
            animation: fadeIn 1s ease-in;
        }

        @keyframes fadeIn {
            from {opacity: 0; transform: translateY(20px);}
            to {opacity: 1; transform: translateY(0);}
        }

        textarea {
            width: 90%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #5a67d8;
            transform: scale(1.05);
        }

        .result {
            margin-top: 20px;
            font-size: 22px;
            font-weight: bold;
        }

        #chatbox {
            height: 180px;
            overflow-y: auto;
            border: 1px solid #ccc;
            padding: 10px;
            margin-top: 15px;
            border-radius: 8px;
            background: #f9f9f9;
            color: black;
        }

        input {
            padding: 10px;
            width: 70%;
            border-radius: 8px;
            border: 1px solid #ccc;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>🤖 AI Spam Detector</h1>

    <form action="/predict" method="post">
        <textarea name="message" rows="4" placeholder="Enter your message..."></textarea><br><br>
        <button type="submit">Check</button>
    </form>

    <div class="result">
        {{ prediction_text }}
    </div>

    <h3>💬 Chat with AI</h3>

    <div id="chatbox"></div>

    <input type="text" id="userInput" placeholder="Ask something...">
    <button onclick="sendMessage()">Send</button>
</div>

<script>
function sendMessage() {
    let input = document.getElementById("userInput").value;

    fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: input })
    })
    .then(res => res.json())
    .then(data => {
        let box = document.getElementById("chatbox");
        box.innerHTML += "<p><b>You:</b> " + input + "</p>";
        box.innerHTML += "<p><b>Bot:</b> " + data.reply + "</p>";
        box.scrollTop = box.scrollHeight;
    });
}
</script>

</body>
</html>
